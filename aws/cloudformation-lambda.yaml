AWSTemplateFormatVersion: '2010-09-09'
Description: 'Mortgage Rate Notifier - Serverless Deployment on AWS Lambda with API Gateway'

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name for resource naming and configuration

  AccountId:
    Type: String
    Default: '105726692206'
    Description: AWS Account ID

  FredApiKey:
    Type: String
    NoEcho: true
    Default: 'YOUR-FRED-API-KEY-HERE'
    Description: FRED API Key for mortgage rate data

  OpenAiApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API Key for RAG system

  LambdaTimeout:
    Type: Number
    Default: 60
    MinValue: 10
    MaxValue: 900
    Description: Lambda function timeout in seconds

  LambdaMemory:
    Type: Number
    Default: 512
    AllowedValues: [128, 256, 512, 1024, 2048, 3008, 10240]
    Description: Lambda function memory in MB

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Environment Configuration"
        Parameters:
          - EnvironmentName
          - AccountId
      - Label:
          default: "API Keys & Secrets"
        Parameters:
          - FredApiKey
          - OpenAiApiKey
      - Label:
          default: "Lambda Configuration"
        Parameters:
          - LambdaTimeout
          - LambdaMemory

Resources:
  # ============================================================================
  # IAM Role for Lambda
  # ============================================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ParameterStoreAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mortgage-rate-notifier/*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DocumentsBucket.Arn
                  - !Sub '${DocumentsBucket.Arn}/*'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mortgage-rate-notifier/*'
        - PolicyName: SNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !GetAtt NotificationTopic.TopicArn
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*'

  # ============================================================================
  # S3 Bucket for Financial Documents
  # ============================================================================
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'mortgage-rate-notifier-${EnvironmentName}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: MortgageRateNotifier

  # ============================================================================
  # Parameter Store for Secrets
  # ============================================================================
  FredApiKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mortgage-rate-notifier/FRED_API_KEY
      Type: SecureString
      Value: !Ref FredApiKey
      Description: FRED API Key for mortgage rate data
      Tags:
        Environment: !Ref EnvironmentName

  OpenAiApiKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /mortgage-rate-notifier/OPENAI_API_KEY
      Type: SecureString
      Value: !Ref OpenAiApiKey
      Description: OpenAI API Key for RAG system
      Tags:
        Environment: !Ref EnvironmentName

  # ============================================================================
  # SNS Topic for Notifications
  # ============================================================================
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'mortgage-rate-notifier-${EnvironmentName}'
      DisplayName: 'Mortgage Rate Notifier Alerts'
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ============================================================================
  # Lambda Function - Main Decision Handler
  # ============================================================================
  MortgageRateDecisionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'mortgage-rate-notifier-${EnvironmentName}'
      Runtime: python3.11
      Handler: src.lambda_handler.handler
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Sub 'mortgage-rate-notifier-code-${AWS::AccountId}'
        S3Key: !Sub 'lambda-code-${EnvironmentName}.zip'
      Environment:
        Variables:
          AWS_REGION: !Ref AWS::Region
          ENVIRONMENT: !Ref EnvironmentName
          DOCUMENTS_BUCKET: !Ref DocumentsBucket
          SNS_TOPIC_ARN: !GetAtt NotificationTopic.TopicArn
      EphemeralStorage:
        Size: 512
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ============================================================================
  # API Gateway
  # ============================================================================
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'mortgage-rate-notifier-${EnvironmentName}'
      Description: 'REST API for Mortgage Rate Notifier'
      EndpointConfiguration:
        Types:
          - REGIONAL

  # Root resource for /
  RootResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: ''

  # /decision resource
  DecisionResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: decision

  # POST /decision
  DecisionMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref DecisionResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MortgageRateDecisionFunction.Arn}/invocations'

  # /batch resource
  BatchResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: batch

  # POST /batch
  BatchMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref BatchResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MortgageRateDecisionFunction.Arn}/invocations'

  # /health resource
  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: health

  # GET /health
  HealthMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MortgageRateDecisionFunction.Arn}/invocations'

  # /metrics resource
  MetricsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: metrics

  # GET /metrics
  MetricsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref MetricsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MortgageRateDecisionFunction.Arn}/invocations'

  # Lambda permission for API Gateway
  ApiGatewayLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MortgageRateDecisionFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # API Deployment (stage)
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - DecisionMethod
      - BatchMethod
      - HealthMethod
      - MetricsMethod
    Properties:
      RestApiId: !Ref ApiGateway

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: !Ref EnvironmentName
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeployment
      TracingEnabled: true
      LoggingLevel: INFO
      DataTraceEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO

  # ============================================================================
  # CloudWatch Logs
  # ============================================================================
  # ============================================================================
  # CloudWatch Logs
  # ============================================================================
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/mortgage-rate-notifier-${EnvironmentName}'
      RetentionInDays: 30

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}'
    Export:
      Name: !Sub 'MortgageRateNotifier-${EnvironmentName}-ApiUrl'

  DecisionEndpoint:
    Description: Decision endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/decision'

  BatchEndpoint:
    Description: Batch endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/batch'

  HealthEndpoint:
    Description: Health check endpoint
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/health'

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt MortgageRateDecisionFunction.Arn

  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref MortgageRateDecisionFunction

  DocumentsBucketName:
    Description: S3 bucket for financial documents
    Value: !Ref DocumentsBucket

  SNSTopicArn:
    Description: SNS topic for notifications
    Value: !GetAtt NotificationTopic.TopicArn

  EnvironmentName:
    Description: Environment name
    Value: !Ref EnvironmentName
