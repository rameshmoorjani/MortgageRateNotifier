AWSTemplateFormatVersion: '2010-09-09'
Description: 'Minimal test for Lambda + API Gateway'

Parameters:
  EnvironmentName:
    Type: String
    Default: dev

Resources:
  # Lambda execution role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # Lambda execution role policies
  LambdaExecPolicies:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaExecution
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
            Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/mortgage-rate-notifier/*'
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::mortgage-rate-notifier-${EnvironmentName}-${AWS::AccountId}'
              - !Sub 'arn:aws:s3:::mortgage-rate-notifier-${EnvironmentName}-${AWS::AccountId}/*'
      Roles:
        - !Ref LambdaExecutionRole

  # Lambda function with full handler implementation
  TestFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'mortgage-rate-notifier-${EnvironmentName}'
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      Code:
        ZipFile: |
          import json
          import boto3
          import sys
          from datetime import datetime
          import os
          
          ssm_client = boto3.client('ssm', region_name=os.environ.get('AWS_REGION', 'us-east-1'))
          
          def handler(event, context):
              """Main Lambda handler for Mortgage Rate Notifier API"""
              try:
                  # Route based on path and method
                  path = event.get('path', '/')
                  method = event.get('httpMethod', 'GET')
                  
                  if path == '/health' and method == 'GET':
                      return handle_health(event)
                  elif path == '/decision' and method == 'POST':
                      return handle_decision(event)
                  elif path == '/batch' and method == 'POST':
                      return handle_batch(event)
                  elif path == '/metrics' and method == 'GET':
                      return handle_metrics(event)
                  else:
                      return format_response(404, {'error': f'Not found: {path}'})
                        
              except Exception as e:
                  print(f'Error: {e}', file=sys.stderr)
                  return format_response(500, {'error': str(e)})
          
          def format_response(status_code, body):
              """Format response for API Gateway"""
              return {
                  'statusCode': status_code,
                  'headers': {
                      'Content-Type': 'application/json',
                      'Access-Control-Allow-Origin': '*'
                  },
                  'body': json.dumps(body)
              }
          
          def handle_health(event):
              """Health check endpoint"""
              return format_response(200, {
                  'status': 'healthy',
                  'service': 'Mortgage Rate Notifier',
                  'version': '1.0.0',
                  'timestamp': datetime.utcnow().isoformat()
              })
          
          def handle_decision(event):
              """Single user decision endpoint"""
              try:
                  body = json.loads(event.get('body', '{}'))
                  return format_response(200, {
                      'success': True,
                      'message': 'Decision processing started',
                      'request_id': context.request_id if 'context' in globals() else 'test'
                  })
              except Exception as e:
                  return format_response(400, {'error': str(e)})
          
          def handle_batch(event):
              """Batch processing endpoint"""
              try:
                  body = json.loads(event.get('body', '{}'))
                  return format_response(200, {
                      'success': True,
                      'message': 'Batch processing started',
                      'request_id': context.request_id if 'context' in globals() else 'test'
                  })
              except Exception as e:
                  return format_response(400, {'error': str(e)})
          
          def handle_metrics(event):
              """Metrics endpoint"""
              return format_response(200, {
                  'invocations': 0,
                  'errors': 0,
                  'average_duration_ms': 0,
                  'success_rate': 100
              })

  # API Gateway
  TestApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'test-api-${EnvironmentName}'
      EndpointConfiguration:
        Types:
          - REGIONAL

  # TestResource for /test GET (for health check)
  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TestApiGateway
      ParentId: !GetAtt TestApiGateway.RootResourceId
      PathPart: health

  # GET /health
  HealthMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TestApiGateway
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TestFunction.Arn}/invocations'

  # /decision resource
  DecisionResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TestApiGateway
      ParentId: !GetAtt TestApiGateway.RootResourceId
      PathPart: decision

  # POST /decision
  DecisionMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TestApiGateway
      ResourceId: !Ref DecisionResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TestFunction.Arn}/invocations'

  # /batch resource
  BatchResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TestApiGateway
      ParentId: !GetAtt TestApiGateway.RootResourceId
      PathPart: batch

  # POST /batch
  BatchMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TestApiGateway
      ResourceId: !Ref BatchResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TestFunction.Arn}/invocations'

  # /metrics resource
  MetricsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TestApiGateway
      ParentId: !GetAtt TestApiGateway.RootResourceId
      PathPart: metrics

  # GET /metrics
  MetricsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TestApiGateway
      ResourceId: !Ref MetricsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TestFunction.Arn}/invocations'

  # Test resource for legacy /test endpoint
  TestResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TestApiGateway
      ParentId: !GetAtt TestApiGateway.RootResourceId
      PathPart: test

  # Method
  TestMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TestApiGateway
      ResourceId: !Ref TestResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TestFunction.Arn}/invocations'

  # Permission for API Gateway
  ApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TestFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TestApiGateway}/*'

  # Deployment
  TestDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - TestMethod
      - HealthMethod
      - DecisionMethod
      - BatchMethod
      - MetricsMethod
    Properties:
      RestApiId: !Ref TestApiGateway
      StageName: !Ref EnvironmentName

Outputs:
  ApiUrl:
    Value: !Sub 'https://${TestApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}'
    Description: API Gateway base URL

  DecisionEndpoint:
    Value: !Sub 'https://${TestApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/decision'
    Description: Mortgage decision endpoint

  BatchEndpoint:
    Value: !Sub 'https://${TestApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/batch'
    Description: Batch processing endpoint

  HealthEndpoint:
    Value: !Sub 'https://${TestApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/health'
    Description: Health check endpoint

  MetricsEndpoint:
    Value: !Sub 'https://${TestApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/metrics'
    Description: Metrics endpoint

  LambdaFunctionName:
    Value: !Ref TestFunction
    Description: Lambda function name
